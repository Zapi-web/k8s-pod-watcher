apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-operator
  namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deployment
  namespace: {{ .Release.Namespace }}
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.appLabel }}
  template:
    metadata:
      labels:
        app: {{ .Values.appLabel }}
      {{- if .Values.metrics.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: {{ .Values.metrics.path | quote }}
        prometheus.io/port: {{ .Values.metrics.port | default "8080" | quote }}
      {{- end }}
    spec:
      terminationGracePeriodSeconds: 15
      serviceAccountName: {{ .Release.Name }}-operator
      containers:
      - name: watcher
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        env:
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secret
              key: TELEGRAM_BOT_TOKEN
        - name: TELEGRAM_CHAT_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secret
              key: TELEGRAM_CHAT_ID
        - name: DISCORD_WEBHOOK
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secret
              key: DISCORD_WEBHOOK
        - name: SLACK_WEBHOOK
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secret
              key: SLACK_WEBHOOK
        - name: LOG_LEVEL
          value: {{ .Values.logLevel | default "info" | quote }}
        - name: METRICS_PORT
          value: {{ .Values.metrics.port | default "8080" | quote }}
        - name: NOTIFICATION_CHANNELS
          value: {{ .Values.channels | quote }}

        ports:
        - containerPort: {{ .Values.metrics.port | default 8080 }}
          name: metrics

        resources:
          {{- toYaml .Values.resources | nindent 10}}
        
        livenessProbe:
          httpGet:
            path: /health
            port: metrics
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: metrics
          initialDelaySeconds: 5
          periodSeconds: 10
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532 
          capabilities:
            drop:
              - ALL