name: Helm Test and Push

on:
  workflow_call:

permissions: {}

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
        
      - name: Set up Helm
        uses: azure/setup-helm@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          check-latest: true
      
      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0
        
      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --target-branch ${{ github.event.repository.default_branch }}
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: lint-test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Login to Github Packages
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and Push Helm Chart
        run: |
          CHART_DIR="charts/k8s-pod-watcher"
          
          CHART_VERSION=$(yq '.version' $CHART_DIR/Chart.yaml)
          CHART_NAME=$(yq '.name' $CHART_DIR/Chart.yaml)

          REGISTRY_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm package $CHART_DIR

          helm push ${CHART_NAME}-${CHART_VERSION}.tgz oci://ghcr.io/${REGISTRY_OWNER}/charts