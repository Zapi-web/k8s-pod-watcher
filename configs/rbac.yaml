apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-watcher-operator-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-watcher-operator-rb
subjects:
  - kind: ServiceAccount
    name: pod-watcher-operator
    namespace: default
roleRef:
  kind: ClusterRole
  name: pod-watcher-operator-role
  apiGroup: rbac.authorization.k8s.io